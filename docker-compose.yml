# Local dev (default): `docker compose up -d --build`
#
# Production with a published GHCR image (no local build):
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d
# Or uncomment `image` below and comment out `build` on the app service.
#
# services:
#   app:
#     image: ghcr.io/<owner>/hearth:latest

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:/app/data/hearth.db
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
    volumes:
      - hearth-data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  hearth-data:
