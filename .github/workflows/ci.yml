name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./data/ci.db"
      SESSION_SECRET: "ci-test-secret-not-for-production"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: mkdir -p data
      - run: pnpm db:migrate
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
        env:
          SKIP_AUTO_MIGRATE: "1"
